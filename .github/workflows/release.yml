name: Build Arch Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libcairo2-dev libglib2.0-dev libgtk-layer-shell-dev
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build binaries
        run: |
          mkdir -p build/usr/bin build/etc/hypr-dock
          go build -v -ldflags="-X main.Version=${{ steps.version.outputs.VERSION }}" -o build/usr/bin/hypr-dock ./cmd/hypr-dock/.
          go build -v -ldflags="-X main.Version=${{ steps.version.outputs.VERSION }}" -o build/usr/bin/hypr-alttab ./cmd/hypr-alttab/.
          cp -r configs/default/* build/etc/hypr-dock/ 2>/dev/null || true
      
      - name: Build Arch package
        uses: heyhusen/archlinux-package-action@v2
        with:
          pkgname: hypr-dock
          pkgver: ${{ steps.version.outputs.VERSION }}
          pkgdesc: "Dock and Alt-Tab switcher for Hyprland"
          depends: |
            gtk3
            cairo
            gtk-layer-shell
          files: |
            usr/bin/hypr-dock:755:build/usr/bin/hypr-dock
            usr/bin/hypr-alttab:755:build/usr/bin/hypr-alttab
            etc/hypr-dock/config:644:build/etc/hypr-dock/config
          install: |
            post_install() {
              echo "hypr-dock installed!"
              echo "Configs are in /etc/hypr-dock/"
            }
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "*.pkg.tar.zst"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}