name: Build Arch Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create PKGBUILD
        run: |
          mkdir -p arch-package
          cat > arch-package/PKGBUILD << 'EOF'
          # Maintainer: GitHub Actions
          pkgname=hypr-dock
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="Dock and Alt-Tab switcher for Hyprland"
          arch=('x86_64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          depends=('gtk3' 'cairo' 'gtk-layer-shell')
          makedepends=('go')
          
          build() {
            cd "$srcdir"
            export CGO_CFLAGS="-I/usr/include/gtk-3.0 -I/usr/include/cairo -I/usr/include/glib-2.0 -I/usr/lib/x86_64-linux-gnu/glib-2.0/include"
            export CGO_LDFLAGS="-lgtk-3 -lgdk-3 -lcairo -lgobject-2.0 -lglib-2.0"
            go build -o hypr-dock ./cmd/hypr-dock/.
            go build -o hypr-alttab ./cmd/hypr-alttab/.
          }
          
          package() {
            install -Dm755 "$srcdir/hypr-dock" "$pkgdir/usr/bin/hypr-dock"
            install -Dm755 "$srcdir/hypr-alttab" "$pkgdir/usr/bin/hypr-alttab"
            install -dm755 "$pkgdir/etc/hypr-dock"
            cp -r "$srcdir/configs/default"/* "$pkgdir/etc/hypr-dock/" 2>/dev/null || true
          }
          EOF
          
          sed -i "s/__VERSION__/${{ steps.version.outputs.VERSION }}/" arch-package/PKGBUILD
          cp -r cmd configs go.mod go.sum arch-package/ 2>/dev/null || true
      
      - name: Build Arch package
        uses: heyhusen/archlinux-package-action@v2
        with:
          path: arch-package
          pkgver: ${{ steps.version.outputs.VERSION }}
          flags: '--syncdeps --noconfirm --needed'
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: arch-package/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}