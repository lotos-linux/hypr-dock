name: Build Arch Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libcairo2-dev libglib2.0-dev libgtk-layer-shell-dev
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build binaries
        run: |
          mkdir -p pkg/usr/bin pkg/etc/hypr-dock
          go build -v -ldflags="-X main.Version=${{ steps.version.outputs.VERSION }}" -o pkg/usr/bin/hypr-dock ./cmd/hypr-dock/.
          go build -v -ldflags="-X main.Version=${{ steps.version.outputs.VERSION }}" -o pkg/usr/bin/hypr-alttab ./cmd/hypr-alttab/.
          cp -r configs/default/* pkg/etc/hypr-dock/ 2>/dev/null || true
      
      - name: Create PKGBUILD
        run: |
          cat > PKGBUILD << EOF
          # Maintainer: GitHub Actions
          pkgname=hypr-dock
          pkgver=${{ steps.version.outputs.VERSION }}
          pkgrel=1
          pkgdesc="Dock and Alt-Tab switcher for Hyprland"
          arch=('x86_64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          depends=('gtk3' 'cairo' 'gtk-layer-shell')
          makedepends=('go')
          
          package() {
            cd "\$srcdir"
            install -Dm755 pkg/usr/bin/hypr-dock "\$pkgdir/usr/bin/hypr-dock"
            install -Dm755 pkg/usr/bin/hypr-alttab "\$pkgdir/usr/bin/hypr-alttab"
            install -dm755 "\$pkgdir/etc/hypr-dock"
            cp -r pkg/etc/hypr-dock/* "\$pkgdir/etc/hypr-dock/" 2>/dev/null || true
          }
          EOF
          
          # Создаем .install скрипт
          cat > hypr-dock.install << 'EOF'
          post_install() {
            echo "hypr-dock installed!"
            echo "Configs are in /etc/hypr-dock/"
            echo "Add to your Hyprland config:"
            echo "exec-once = hypr-dock"
            echo "bind = \$mainMod, Tab, exec, hypr-alttab"
          }
          
          post_upgrade() {
            post_install
          }
          
          post_remove() {
            echo "hypr-dock removed. Configs remain in /etc/hypr-dock/"
          }
          EOF
      
      - name: Build Arch package
        uses: heyhusen/archlinux-package-action@v2
        with:
          pkgver: ${{ steps.version.outputs.VERSION }}
          flags: '--noconfirm'
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "*.pkg.tar.zst"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}