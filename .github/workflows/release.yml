name: Build Arch Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      use_existing_tag:
        description: 'Use latest existing tag instead of generating new one'
        type: boolean
        default: true
        required: false

permissions:
  contents: read

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 30
    permissions:
      contents: write  # Для загрузки в релиз
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Using release version: $VERSION"
          else
            if [ "${{ github.event.inputs.use_existing_tag }}" == "true" ]; then
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              VERSION="${LATEST_TAG#v}"
              echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
              echo "Using latest tag: $VERSION"
            else
              VERSION="$(date +%Y%m%d%H%M%S)"
              echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
              echo "WARNING: Using generated version without existing tag: $VERSION"
            fi
          fi
      
      - name: Prepare PKGBUILD
        run: |
          mkdir -p arch-package
          
          cat > arch-package/PKGBUILD << 'EOF'
          # Maintainer: GitHub Actions
          pkgname=hypr-dock
          pkgver=${{ steps.version.outputs.VERSION }}
          pkgrel=1
          pkgdesc="Interactive Dock Panel for Hyprland"
          arch=('x86_64')
          url="https://github.com/${{ github.repository }}"
          license=('GPL3')
          depends=('gtk3' 'gtk-layer-shell')
          makedepends=('go' 'git' 'make')
          provides=('hypr-dock' 'hypr-alttab')
          conflicts=()
          
          source=("hypr-dock.tar.gz::https://github.com/${{ github.repository }}/archive/refs/tags/v${pkgver}.tar.gz")
          
          build() {
            cd "$srcdir/hypr-dock-${pkgver}"
            
            export CGO_CPPFLAGS="${CPPFLAGS}"
            export CGO_CFLAGS="${CFLAGS}"
            export CGO_CXXFLAGS="${CXXFLAGS}"
            export CGO_LDFLAGS="${LDFLAGS}"
            export GOFLAGS="-buildmode=pie -trimpath -mod=readonly -modcacherw"
            
            mkdir -p bin
            
            go build -v -o "bin/hypr-dock" -ldflags="-linkmode=external" ./cmd/hypr-dock
            go build -v -o "bin/hypr-alttab" -ldflags="-linkmode=external" ./cmd/hypr-alttab
          }
          
          package() {
            cd "$srcdir/hypr-dock-${pkgver}"
            
            install -Dm755 "bin/hypr-dock" "$pkgdir/usr/bin/hypr-dock"
            install -Dm755 "bin/hypr-alttab" "$pkgdir/usr/bin/hypr-alttab"
            
            if [ -d "configs/default" ]; then
              install -dm755 "$pkgdir/etc/hypr-dock"
              cp -r configs/default/* "$pkgdir/etc/hypr-dock/"
            fi
            
            install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$pkgname/LICENSE" 2>/dev/null || true
            
            if [ -f "README.md" ]; then
              install -Dm644 README.md "$pkgdir/usr/share/doc/$pkgname/README.md" 2>/dev/null || true
            fi
          }
          EOF
          
          echo "PKGBUILD created successfully:"
          cat arch-package/PKGBUILD
      
      - name: Update system and install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed go git base-devel pacman-contrib
      
      - name: Build package
        id: build
        run: |
          cd arch-package
          
          # Обновляем контрольные суммы
          updpkgsums
          
          # Создаем пользователя для сборки (makepkg не может работать от root)
          useradd -m builder
          chown -R builder:builder .
          
          # Собираем пакет
          su builder -c "makepkg -s --noconfirm"
          
          # Находим основной пакет (не debug)
          PKG_FILE=$(ls *.pkg.tar.zst | grep -v debug | head -1)
          if [ -n "$PKG_FILE" ]; then
            echo "Found package: $PKG_FILE"
            echo "pkg_path=$(realpath $PKG_FILE)" >> $GITHUB_OUTPUT
            echo "pkg_name=$PKG_FILE" >> $GITHUB_OUTPUT
            
            echo "Package size: $(du -h $PKG_FILE | cut -f1)"
            file $PKG_FILE
          else
            echo "::error::No package file found!"
            ls -la
            exit 1
          fi
      
      - name: Attach package to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: arch-package/${{ steps.build.outputs.pkg_name }}
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload as workflow artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hypr-dock-${{ steps.version.outputs.VERSION }}-arch-package
          path: arch-package/${{ steps.build.outputs.pkg_name }}
          if-no-files-found: error
          retention-days: 30